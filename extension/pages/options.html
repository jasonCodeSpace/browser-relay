<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Browser Relay Options</title>
    <style>
      body {
        max-width: 760px;
        margin: 40px auto;
        padding: 0 24px;
        color: #111111;
        background: #ffffff;
        font: 14px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      h1 {
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #111111;
        font: inherit;
        box-sizing: border-box;
      }
      button {
        margin-top: 16px;
        padding: 10px 14px;
        border: 1px solid #111111;
        background: #111111;
        color: #ffffff;
        cursor: pointer;
      }
      #message {
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Browser Relay Options</h1>
    <label for="serverUrl">Relay server URL</label>
    <input id="serverUrl" type="text" />
    <label for="maxTabs">Max relay tabs</label>
    <input id="maxTabs" type="number" min="1" max="12" />
    <button id="save">Save and reconnect</button>
    <div id="message"></div>
    <script src="options.js"></script>
  </body>
</html>
